<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif">
  <rect width="600" height="400" fill="#fafafa" rx="12"/>
  
  <text x="300" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">四维能力模型</text>
  <text x="300" y="62" text-anchor="middle" font-size="13" fill="#64748b">诊断回应在哪个维度缺失</text>

  <!-- 四个维度卡片 -->
  <rect x="30" y="90" width="120" height="130" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="90" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#2563eb">回应力</text>
  <text x="90" y="142" text-anchor="middle" font-size="11" fill="#64748b">听到了</text>
  <text x="90" y="158" text-anchor="middle" font-size="11" fill="#64748b">但没接住</text>
  <rect x="50" y="175" width="80" height="6" rx="3" fill="#e2e8f0"/>
  <rect x="50" y="175" width="60" height="6" rx="3" fill="#2563eb"/>

  <rect x="170" y="90" width="120" height="130" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="230" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#f59e0b">容错力</text>
  <text x="230" y="142" text-anchor="middle" font-size="11" fill="#64748b">过早切换到</text>
  <text x="230" y="158" text-anchor="middle" font-size="11" fill="#64748b">解决方案</text>
  <rect x="190" y="175" width="80" height="6" rx="3" fill="#e2e8f0"/>
  <rect x="190" y="175" width="40" height="6" rx="3" fill="#f59e0b"/>

  <rect x="310" y="90" width="120" height="130" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="370" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#ef4444">节奏感</text>
  <text x="370" y="142" text-anchor="middle" font-size="11" fill="#64748b">直接关闭</text>
  <text x="370" y="158" text-anchor="middle" font-size="11" fill="#64748b">话题</text>
  <rect x="330" y="175" width="80" height="6" rx="3" fill="#e2e8f0"/>
  <rect x="330" y="175" width="20" height="6" rx="3" fill="#ef4444"/>

  <rect x="450" y="90" width="120" height="130" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="510" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#8b5cf6">锚定感</text>
  <text x="510" y="142" text-anchor="middle" font-size="11" fill="#64748b">缺少情感</text>
  <text x="510" y="158" text-anchor="middle" font-size="11" fill="#64748b">锚点信息</text>
  <rect x="470" y="175" width="80" height="6" rx="3" fill="#e2e8f0"/>
  <rect x="470" y="175" width="20" height="6" rx="3" fill="#8b5cf6"/>

  <!-- 底部说明 -->
  <rect x="30" y="250" width="540" height="120" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="300" y="280" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">常见短板：节奏感 + 容错力</text>
  <text x="300" y="305" text-anchor="middle" font-size="12" fill="#64748b">大多数人在对方释放情绪信号时，</text>
  <text x="300" y="325" text-anchor="middle" font-size="12" fill="#64748b">要么过早切换到解决方案（容错力低），</text>
  <text x="300" y="345" text-anchor="middle" font-size="12" fill="#64748b">要么直接关闭话题（节奏感低）</text>
</svg>