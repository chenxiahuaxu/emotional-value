<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif">
  <rect width="600" height="360" fill="#fafafa" rx="12"/>
  <defs>
    <linearGradient id="withdrawGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fecaca"/><stop offset="100%" stop-color="#fca5a5"/>
    </linearGradient>
    <linearGradient id="depositGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bbf7d0"/><stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
  </defs>

  <text x="300" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">情绪银行——每一句话都是存取</text>

  <!-- Left column: WITHDRAW -->
  <rect x="30" y="45" width="240" height="270" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <!-- Down arrow -->
  <polygon points="150,65 170,100 130,100" fill="#ef4444"/>
  <rect x="140" y="100" width="20" height="14" fill="#ef4444"/>
  <text x="150" y="130" text-anchor="middle" font-size="14" fill="#dc2626" font-weight="700">取款 ❌</text>

  <!-- Withdraw examples -->
  <rect x="55" y="148" width="190" height="44" rx="6" fill="url(#withdrawGrad)"/>
  <text x="65" y="166" font-size="11" fill="#991b1b" font-weight="600">"确实有问题"</text>
  <text x="65" y="183" font-size="10" fill="#b91c1c">否定对方的三版努力</text>
  <text x="235" y="175" text-anchor="end" font-size="18" fill="#ef4444">−</text>

  <rect x="55" y="200" width="190" height="44" rx="6" fill="url(#withdrawGrad)"/>
  <text x="65" y="218" font-size="11" fill="#991b1b" font-weight="600">"你听我解释"</text>
  <text x="65" y="235" font-size="10" fill="#b91c1b">关闭情绪通道，强行讲理</text>
  <text x="235" y="227" text-anchor="end" font-size="18" fill="#ef4444">−</text>

  <rect x="55" y="252" width="190" height="44" rx="6" fill="url(#withdrawGrad)"/>
  <text x="65" y="270" font-size="11" fill="#991b1b" font-weight="600">"下次努力"</text>
  <text x="65" y="287" font-size="10" fill="#b91c1b">正确的废话，无连接</text>
  <text x="235" y="279" text-anchor="end" font-size="18" fill="#ef4444">−</text>

  <!-- Right column: DEPOSIT -->
  <rect x="300" y="45" width="270" height="270" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <!-- Up arrow -->
  <polygon points="435,114 455,79 415,79" fill="#22c55e"/>
  <rect x="425" y="65" width="20" height="14" fill="#22c55e"/>
  <text x="435" y="130" text-anchor="middle" font-size="14" fill="#16a34a" font-weight="700">存款 ✅</text>

  <!-- Deposit examples -->
  <rect x="325" y="148" width="220" height="44" rx="6" fill="url(#depositGrad)"/>
  <text x="335" y="166" font-size="11" fill="#166534" font-weight="600">"换了我也崩"</text>
  <text x="335" y="183" font-size="10" fill="#15803d">站在对方阵营，先共情</text>
  <text x="535" y="175" text-anchor="end" font-size="18" fill="#22c55e">+</text>

  <rect x="325" y="200" width="220" height="44" rx="6" fill="url(#depositGrad)"/>
  <text x="335" y="218" font-size="11" fill="#166534" font-weight="600">"累坏了吧？今天忙什么了"</text>
  <text x="335" y="235" font-size="10" fill="#15803d">先接情绪，开对话口</text>
  <text x="535" y="227" text-anchor="end" font-size="18" fill="#22c55e">+</text>

  <rect x="325" y="252" width="220" height="44" rx="6" fill="url(#depositGrad)"/>
  <text x="335" y="270" font-size="11" fill="#166534" font-weight="600">"三版啊，这个量已经很能扛了"</text>
  <text x="335" y="287" font-size="10" fill="#15803d">肯定付出，看见努力</text>
  <text x="535" y="279" text-anchor="end" font-size="18" fill="#22c55e">+</text>

  <!-- Bottom principle -->
  <text x="300" y="340" text-anchor="middle" font-size="12" fill="#64748b">核心原则：先存后取，余额不掉。存够了再聊方案。</text>
</svg>