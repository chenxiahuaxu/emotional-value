<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif">
  <rect width="900" height="200" fill="#fafafa" rx="12"/>
  
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">五步分析流程</text>

  <!-- 输入 -->
  <rect x="20" y="60" width="80" height="100" rx="10" fill="#e0e7ff" stroke="#818cf8" stroke-width="1.5"/>
  <text x="60" y="100" text-anchor="middle" font-size="11" fill="#4338ca" font-weight="700">你丢来</text>
  <text x="60" y="118" text-anchor="middle" font-size="10" fill="#4338ca">一句话</text>
  <text x="60" y="145" text-anchor="middle" font-size="9" fill="#818cf8">输入</text>

  <!-- 箭头 -->
  <line x1="100" y1="110" x2="120" y2="110" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="120,105 130,110 120,115" fill="#94a3b8"/>

  <!-- 步骤1 -->
  <rect x="125" y="60" width="110" height="100" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="180" y="88" text-anchor="middle" font-size="13" fill="#1e40af" font-weight="700">场景定位</text>
  <text x="180" y="108" text-anchor="middle" font-size="10" fill="#64748b">判断场景类型</text>
  <text x="180" y="124" text-anchor="middle" font-size="10" fill="#64748b">明确沟通目标</text>
  <text x="180" y="148" text-anchor="middle" font-size="9" fill="#94a3b8">第一步</text>

  <line x1="235" y1="110" x2="255" y2="110" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="255,105 265,110 255,115" fill="#94a3b8"/>

  <!-- 步骤2 -->
  <rect x="260" y="60" width="110" height="100" rx="10" fill="#ffffff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="315" y="88" text-anchor="middle" font-size="13" fill="#3730a3" font-weight="700">情绪信号</text>
  <text x="315" y="104" text-anchor="middle" font-size="13" fill="#3730a3" font-weight="700">识别</text>
  <text x="315" y="124" text-anchor="middle" font-size="10" fill="#64748b">情绪+需求+潜台词</text>
  <text x="315" y="148" text-anchor="middle" font-size="9" fill="#94a3b8">第二步</text>

  <line x1="370" y1="110" x2="390" y2="110" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="390,105 400,110 390,115" fill="#94a3b8"/>

  <!-- 步骤3 -->
  <rect x="395" y="60" width="110" height="100" rx="10" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="450" y="88" text-anchor="middle" font-size="13" fill="#5b21b6" font-weight="700">四维诊断</text>
  <text x="450" y="108" text-anchor="middle" font-size="10" fill="#64748b">四个维度逐项</text>
  <text x="450" y="124" text-anchor="middle" font-size="10" fill="#64748b">评分+短板定位</text>
  <text x="450" y="148" text-anchor="middle" font-size="9" fill="#94a3b8">第三步</text>

  <line x1="505" y1="110" x2="525" y2="110" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="525,105 535,110 525,115" fill="#94a3b8"/>

  <!-- 步骤4 -->
  <rect x="530" y="60" width="110" height="100" rx="10" fill="#ffffff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="585" y="88" text-anchor="middle" font-size="13" fill="#6b21a8" font-weight="700">高价值</text>
  <text x="585" y="104" text-anchor="middle" font-size="13" fill="#6b21a8" font-weight="700">改写</text>
  <text x="585" y="124" text-anchor="middle" font-size="10" fill="#64748b">2-3个替代方案</text>
  <text x="585" y="148" text-anchor="middle" font-size="9" fill="#94a3b8">第四步</text>

  <line x1="640" y1="110" x2="660" y2="110" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="660,105 670,110 660,115" fill="#94a3b8"/>

  <!-- 步骤5 -->
  <rect x="665" y="60" width="110" height="100" rx="10" fill="#ffffff" stroke="#c084fc" stroke-width="1.5"/>
  <text x="720" y="88" text-anchor="middle" font-size="13" fill="#7e22ce" font-weight="700">原理拆解</text>
  <text x="720" y="108" text-anchor="middle" font-size="10" fill="#64748b">为什么原来的不好</text>
  <text x="720" y="124" text-anchor="middle" font-size="10" fill="#64748b">为什么新的更好</text>
  <text x="720" y="148" text-anchor="middle" font-size="9" fill="#94a3b8">第五步</text>

  <!-- 输出 -->
  <line x1="775" y1="110" x2="795" y2="110" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="795,105 805,110 795,115" fill="#94a3b8"/>
  <rect x="800" y="60" width="80" height="100" rx="10" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5"/>
  <text x="840" y="100" text-anchor="middle" font-size="11" fill="#166534" font-weight="700">给你</text>
  <text x="840" y="118" text-anchor="middle" font-size="11" fill="#166534" font-weight="700">能用的</text>
  <text x="840" y="145" text-anchor="middle" font-size="9" fill="#4ade80">输出</text>
</svg>